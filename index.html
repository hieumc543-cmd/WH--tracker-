<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WH R&D — Project Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ─────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy:    #0F1923;
  --navy2:   #162130;
  --navy3:   #1E2D3D;
  --navy4:   #243548;
  --gold:    #C8972A;
  --gold2:   #E0AF46;
  --gold-bg: rgba(200,151,42,.1);
  --gold-border: rgba(200,151,42,.3);
  --text:    #E8E2D6;
  --text2:   #A09880;
  --text3:   #5E5848;
  --border:  rgba(255,255,255,.07);
  --border2: rgba(255,255,255,.12);
  --done-bg:    rgba(34,197,94,.1);
  --done-c:     #4ade80;
  --active-bg:  rgba(59,130,246,.12);
  --active-c:   #60a5fa;
  --review-bg:  rgba(168,85,247,.12);
  --review-c:   #c084fc;
  --pending-bg: rgba(200,151,42,.12);
  --pending-c:  #E0AF46;
  --blocked-bg: rgba(239,68,68,.12);
  --blocked-c:  #f87171;
  --todo-bg:    rgba(100,116,139,.1);
  --todo-c:     #94a3b8;
  --radius: 8px;
  --radius-lg: 14px;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--navy);
  color: var(--text);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }

/* ── SCROLLBAR ────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--navy4); border-radius: 99px; }

/* ── LAYOUT ───────────────────────────────────────────────── */
.shell { display: flex; height: 100vh; overflow: hidden; }

/* ── SIDEBAR ──────────────────────────────────────────────── */
.sidebar {
  width: 220px; flex-shrink: 0;
  background: var(--navy2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  padding: 0;
}
.sidebar-logo {
  padding: 20px 18px 14px;
  border-bottom: 1px solid var(--border);
}
.logo-mark {
  font-family: 'Playfair Display', serif;
  font-size: 18px; color: var(--gold); letter-spacing: .02em;
}
.logo-sub {
  font-size: 10px; color: var(--text3); letter-spacing: .12em;
  text-transform: uppercase; margin-top: 2px;
}
.sidebar-nav { flex: 1; padding: 10px 8px; overflow-y: auto; }
.nav-section-label {
  font-size: 10px; font-weight: 600; color: var(--text3);
  letter-spacing: .1em; text-transform: uppercase;
  padding: 10px 10px 4px;
}
.nav-btn {
  display: flex; align-items: center; gap: 9px;
  width: 100%; padding: 7px 10px;
  border: none; background: transparent;
  color: var(--text2); font-size: 13px;
  border-radius: var(--radius); text-align: left;
  transition: background .15s, color .15s;
}
.nav-btn:hover { background: var(--navy3); color: var(--text); }
.nav-btn.active { background: var(--gold-bg); color: var(--gold2); }
.nav-btn .icon { font-size: 15px; width: 18px; text-align: center; opacity: .8; }
.nav-count {
  margin-left: auto; font-size: 10px; font-weight: 600;
  background: var(--navy4); color: var(--text2);
  padding: 1px 6px; border-radius: 99px;
}
.nav-count.urgent { background: var(--blocked-bg); color: var(--blocked-c); }
.sidebar-bottom {
  padding: 12px 8px;
  border-top: 1px solid var(--border);
}
.member-chip {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; border-radius: var(--radius);
  font-size: 12px; color: var(--text2);
}
.avatar {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 600; flex-shrink: 0;
}
.av-tn  { background: rgba(200,151,42,.2); color: var(--gold2); }
.av-02  { background: rgba(96,165,250,.15); color: #60a5fa; }
.av-ai  { background: rgba(74,222,128,.12); color: #4ade80; }

/* ── MAIN ─────────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  background: var(--navy2); border-bottom: 1px solid var(--border);
  padding: 0 24px; height: 52px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.page-title { font-size: 14px; font-weight: 600; color: var(--text); }
.topbar-actions { display: flex; gap: 8px; align-items: center; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: var(--radius);
  font-size: 12px; font-weight: 500; border: none;
  transition: background .15s, opacity .15s;
}
.btn-ghost {
  background: transparent; color: var(--text2);
  border: 1px solid var(--border2);
}
.btn-ghost:hover { background: var(--navy3); color: var(--text); }
.btn-gold {
  background: var(--gold); color: var(--navy);
}
.btn-gold:hover { background: var(--gold2); }
.btn-danger {
  background: var(--blocked-bg); color: var(--blocked-c);
  border: 1px solid rgba(239,68,68,.2);
}
.content {
  flex: 1; overflow-y: auto; padding: 24px;
}

/* ── CARDS / STAT ─────────────────────────────────────────── */
.stat-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 12px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--navy2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 14px 16px;
}
.stat-label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: .06em; }
.stat-val { font-size: 26px; font-weight: 600; margin-top: 4px; }
.stat-val.gold { color: var(--gold2); }
.stat-val.green { color: #4ade80; }
.stat-val.red { color: #f87171; }

/* ── SECTION HEADER ───────────────────────────────────────── */
.sec-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.sec-title {
  font-size: 12px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: .08em;
}

/* ── PROJECT CARD ─────────────────────────────────────────── */
.proj-card {
  background: var(--navy2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 18px 20px;
  margin-bottom: 12px;
  transition: border-color .2s;
}
.proj-card:hover { border-color: var(--border2); }
.proj-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.proj-id { font-size: 10px; color: var(--gold); letter-spacing: .06em; font-weight: 600; margin-bottom: 3px; }
.proj-name { font-size: 15px; font-weight: 600; font-family: 'Playfair Display', serif; color: var(--text); }
.proj-note { font-size: 12px; color: var(--text2); margin-top: 4px; }
.proj-meta { display: flex; gap: 12px; margin-top: 10px; flex-wrap: wrap; }
.meta-chip {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--text2);
  background: var(--navy3); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 3px 9px;
}

/* ── JOURNEY MAP (signature element) ─────────────────────── */
.journey {
  display: flex; align-items: center; gap: 0;
  margin: 14px 0 0; position: relative;
}
.journey-step {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  flex: 1; position: relative; cursor: default;
}
.journey-step:not(:last-child)::after {
  content: '';
  position: absolute; top: 12px; left: 50%; right: -50%;
  height: 2px; background: var(--border2); z-index: 0;
  transition: background .3s;
}
.journey-step.done:not(:last-child)::after { background: var(--gold); }
.journey-step.active:not(:last-child)::after {
  background: linear-gradient(90deg, var(--gold) 30%, var(--border2) 100%);
}
.journey-dot {
  width: 24px; height: 24px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; z-index: 1;
  border: 2px solid var(--border2);
  background: var(--navy); color: var(--text3);
  transition: all .25s;
}
.journey-step.done .journey-dot {
  background: var(--gold); border-color: var(--gold);
  color: var(--navy);
}
.journey-step.active .journey-dot {
  background: var(--navy); border-color: var(--gold2);
  color: var(--gold2); box-shadow: 0 0 0 4px rgba(200,151,42,.15);
}
.journey-label {
  font-size: 9px; color: var(--text3); text-align: center;
  white-space: nowrap; font-weight: 500;
}
.journey-step.done .journey-label,
.journey-step.active .journey-label { color: var(--text2); }

/* ── PROGRESS BAR ─────────────────────────────────────────── */
.prog-wrap { margin-top: 12px; }
.prog-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text3); margin-bottom: 5px; }
.prog-track {
  height: 4px; background: var(--navy4);
  border-radius: 99px; overflow: hidden;
}
.prog-fill {
  height: 100%; border-radius: 99px;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  transition: width .6s cubic-bezier(.4,0,.2,1);
}

/* ── FILTER BAR ───────────────────────────────────────────── */
.filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
.filter-bar select, .filter-bar input {
  background: var(--navy2); border: 1px solid var(--border2);
  color: var(--text); border-radius: var(--radius); padding: 5px 10px;
  font-size: 12px; outline: none;
}
.filter-bar select:focus, .filter-bar input:focus {
  border-color: var(--gold-border);
}
.filter-bar input { flex: 1; min-width: 160px; }

/* ── TASK TABLE ───────────────────────────────────────────── */
.task-table-wrap { overflow-x: auto; }
.task-table {
  width: 100%; border-collapse: collapse;
  font-size: 13px;
}
.task-table th {
  text-align: left; padding: 8px 12px;
  font-size: 10px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: .08em;
  border-bottom: 1px solid var(--border2);
  white-space: nowrap;
}
.task-table td {
  padding: 10px 12px; border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.task-table tr:last-child td { border-bottom: none; }
.task-table tbody tr { transition: background .12s; }
.task-table tbody tr:hover td { background: var(--navy3); }
.task-name-main { font-weight: 500; color: var(--text); }
.task-name-sub { font-size: 11px; color: var(--text3); margin-top: 1px; }
.task-output { font-size: 11px; color: var(--text2); max-width: 160px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── STATUS BADGE ─────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 99px;
  font-size: 10px; font-weight: 600; white-space: nowrap;
}
.b-done    { background: var(--done-bg);    color: var(--done-c); }
.b-active  { background: var(--active-bg);  color: var(--active-c); }
.b-review  { background: var(--review-bg);  color: var(--review-c); }
.b-pending { background: var(--pending-bg); color: var(--pending-c); }
.b-blocked { background: var(--blocked-bg); color: var(--blocked-c); }
.b-todo    { background: var(--todo-bg);    color: var(--todo-c); }

/* ── STATUS SELECT ────────────────────────────────────────── */
.status-sel {
  background: transparent; border: none; outline: none;
  font-size: 12px; font-weight: 600; cursor: pointer;
  padding: 2px 4px; border-radius: var(--radius);
  transition: background .12s;
}
.status-sel:hover { background: var(--navy4); }
.s-done    { color: var(--done-c); }
.s-active  { color: var(--active-c); }
.s-review  { color: var(--review-c); }
.s-pending { color: var(--pending-c); }
.s-blocked { color: var(--blocked-c); }
.s-todo    { color: var(--todo-c); }

/* ── DEADLINE ─────────────────────────────────────────────── */
.dl-ok   { font-size: 11px; color: var(--text2); }
.dl-soon { font-size: 11px; color: var(--pending-c); }
.dl-over { font-size: 11px; color: var(--blocked-c); font-weight: 600; }
.dl-done { font-size: 11px; color: var(--done-c); }

/* ── ACTION BTNS ──────────────────────────────────────────── */
.action-cell { display: flex; gap: 4px; }
.icon-btn {
  width: 28px; height: 28px; border-radius: var(--radius);
  background: transparent; border: none; display: flex;
  align-items: center; justify-content: center;
  color: var(--text3); font-size: 14px;
  transition: background .12s, color .12s;
}
.icon-btn:hover { background: var(--navy3); color: var(--text); }
.icon-btn.danger:hover { background: var(--blocked-bg); color: var(--blocked-c); }

/* ── MODAL ────────────────────────────────────────────────── */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6); backdrop-filter: blur(3px);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 20px;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--navy2); border: 1px solid var(--border2);
  border-radius: var(--radius-lg); padding: 24px;
  width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto;
  transform: translateY(12px); transition: transform .2s;
}
.modal-backdrop.open .modal { transform: translateY(0); }
.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px; color: var(--text); margin-bottom: 18px;
  display: flex; align-items: center; gap: 10px;
}
.form-row { display: flex; gap: 12px; }
.form-row .fg { flex: 1; }
.fg { margin-bottom: 14px; }
.fg label {
  display: block; font-size: 10px; font-weight: 600;
  color: var(--text3); text-transform: uppercase; letter-spacing: .08em;
  margin-bottom: 5px;
}
.fg input, .fg select, .fg textarea {
  width: 100%;
  background: var(--navy3); border: 1px solid var(--border2);
  color: var(--text); border-radius: var(--radius);
  padding: 8px 11px; font-size: 13px; outline: none;
  transition: border-color .15s;
}
.fg input:focus, .fg select:focus, .fg textarea:focus {
  border-color: var(--gold-border); box-shadow: 0 0 0 3px rgba(200,151,42,.08);
}
.fg textarea { height: 72px; resize: vertical; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 6px; }

/* ── TIMELINE PAGE ────────────────────────────────────────── */
.gantt-wrap { overflow-x: auto; }
.gantt {
  min-width: 580px;
  background: var(--navy2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
}
.gantt-header {
  display: flex; background: var(--navy3);
  border-bottom: 1px solid var(--border2); padding: 8px 16px;
  font-size: 10px; color: var(--text3); font-weight: 600;
  text-transform: uppercase; letter-spacing: .08em;
}
.gantt-label-col { width: 160px; flex-shrink: 0; }
.gantt-bar-col { flex: 1; position: relative; }
.gantt-row {
  display: flex; align-items: center;
  border-bottom: 1px solid var(--border); min-height: 46px;
}
.gantt-row:last-child { border-bottom: none; }
.gantt-row-label {
  width: 160px; flex-shrink: 0; padding: 10px 16px;
  font-size: 12px; font-weight: 500; color: var(--text2);
}
.gantt-row-track {
  flex: 1; position: relative; height: 30px; margin: 0 12px;
}
.gantt-bg { width: 100%; height: 100%; background: var(--navy4); border-radius: 4px; overflow: hidden; }
.gantt-fill {
  height: 100%; position: absolute; top: 0; left: 0;
  display: flex; align-items: center; padding: 0 8px;
  font-size: 10px; font-weight: 600; color: rgba(255,255,255,.85);
  white-space: nowrap; border-radius: 4px;
  transition: width .5s cubic-bezier(.4,0,.2,1);
}
.gantt-today {
  position: absolute; top: 0; width: 1.5px; background: #f87171;
  height: 100%; z-index: 5;
}
.gantt-deadline {
  font-size: 11px; color: var(--text3); padding-right: 16px;
  white-space: nowrap; flex-shrink: 0;
}

/* ── KPI PAGE ─────────────────────────────────────────────── */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap: 16px; }
.kpi-card {
  background: var(--navy2); border: 1px solid var(--border);
  border-radius: var(--radius-lg); padding: 18px 20px;
}
.kpi-card-title {
  font-size: 11px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: .08em;
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}
.kpi-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px;
}
.kpi-row:last-child { border-bottom: none; }
.kpi-target { color: var(--text3); }
.kpi-result { font-weight: 600; }
.kpi-ok  { color: var(--done-c); }
.kpi-warn { color: var(--pending-c); }
.kpi-bad  { color: var(--blocked-c); }

/* ── TOAST ────────────────────────────────────────────────── */
.toast-wrap {
  position: fixed; bottom: 24px; right: 24px; z-index: 200;
  display: flex; flex-direction: column-reverse; gap: 8px;
}
.toast {
  background: var(--navy3); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 10px 16px;
  font-size: 13px; color: var(--text);
  animation: slideIn .2s ease;
  display: flex; align-items: center; gap: 8px;
}
@keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }

/* ── EMPTY ────────────────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 40px 20px;
  color: var(--text3); font-size: 13px;
}
.empty-icon { font-size: 32px; margin-bottom: 8px; opacity: .4; }

/* ── BRIEF PREVIEW ────────────────────────────────────────── */
.brief-box {
  background: var(--navy3); border: 1px solid var(--border2);
  border-left: 3px solid var(--gold);
  border-radius: var(--radius); padding: 14px 16px;
  font-family: 'Courier New', monospace; font-size: 11px;
  line-height: 1.8; color: var(--text2); white-space: pre-wrap;
  margin-top: 16px;
}

/* ── RESPONSIVE ───────────────────────────────────────────── */
@media (max-width: 768px) {
  .sidebar { width: 52px; overflow: hidden; }
  .sidebar-logo { padding: 14px 12px; }
  .logo-sub, .logo-mark-text, .nav-section-label, .nav-btn span, .sidebar-bottom .member-chip span, .nav-count { display: none; }
  .nav-btn { justify-content: center; padding: 8px; }
  .sidebar-logo { justify-content: center; display: flex; }
  .member-chip { justify-content: center; }
  .content { padding: 16px; }
}
</style>
<style>
/* ── AUTH OVERLAY ─────────────────────────────────────────── */
#auth-overlay {
  position:fixed; inset:0; z-index:1000;
  background:var(--navy);
  display:flex; align-items:center; justify-content:center;
}
.auth-box {
  background:var(--navy2); border:1px solid var(--border2);
  border-radius:var(--radius-lg); padding:36px 40px;
  width:100%; max-width:400px;
}
.auth-logo {
  font-family:'Playfair Display',serif;
  font-size:28px; color:var(--gold); text-align:center;
  margin-bottom:4px;
}
.auth-sub {
  text-align:center; font-size:11px; color:var(--text3);
  letter-spacing:.1em; text-transform:uppercase; margin-bottom:28px;
}
.auth-tabs {
  display:flex; gap:0; margin-bottom:24px;
  border-bottom:1px solid var(--border2);
}
.auth-tab {
  flex:1; padding:8px; text-align:center;
  font-size:12px; font-weight:600; color:var(--text3);
  border:none; background:transparent; cursor:pointer;
  border-bottom:2px solid transparent; margin-bottom:-1px;
  transition:color .15s, border-color .15s;
}
.auth-tab.active { color:var(--gold2); border-bottom-color:var(--gold2); }
.auth-err {
  background:var(--blocked-bg); color:var(--blocked-c);
  border:1px solid rgba(239,68,68,.2);
  border-radius:var(--radius); padding:8px 12px;
  font-size:12px; margin-bottom:14px; display:none;
}
.auth-err.show { display:block; }
.btn-google {
  width:100%; padding:9px; border-radius:var(--radius);
  background:var(--navy3); border:1px solid var(--border2);
  color:var(--text); font-size:13px; font-weight:500;
  display:flex; align-items:center; justify-content:center; gap:9px;
  cursor:pointer; transition:background .15s;
  margin-bottom:16px;
}
.btn-google:hover { background:var(--navy4); }
.auth-divider {
  display:flex; align-items:center; gap:10px;
  color:var(--text3); font-size:11px; margin-bottom:16px;
}
.auth-divider::before,.auth-divider::after {
  content:''; flex:1; height:1px; background:var(--border2);
}
.auth-submit {
  width:100%; padding:10px;
  background:var(--gold); color:var(--navy);
  border:none; border-radius:var(--radius);

  return JSON.parse(JSON.stringify(DEFAULT));
}

let db = load();
let page = 'overview';
let filterPhase = 'all', filterStatus = 'all', filterAssignee = 'all';

// ── HELPERS ────────────────────────────────────────────────
const phaseNames = ['Khởi tạo','Khảo sát & Thu thập','Phân tích & Tổng hợp','Phát triển SP','TM hóa'];
const phaseShort = ['P0','P1','P2','P3','P4'];

const statusMap  = {done:'Hoàn thành',active:'Đang làm',review:'Chờ duyệt',pending:'Chuẩn bị',blocked:'Bị chặn',todo:'Chờ',needs_edit:'Cần chỉnh sửa'};

const avClass    = {TN:'av-tn',WH02:'av-02',AI:'av-ai'};

// Returns merged memberMap including any Firestore users
function getMemberMap(){
  const base = {...memberMap};
  (window._adminUsers || []).forEach(u => {
    if(u.assigneeKey && !base[u.assigneeKey])
      base[u.assigneeKey] = u.displayName;
  });
  return base;
}

function daysLeft(s){ if(!s) return null; return Math.round((new Date(s)-TODAY)/86400000); }

function dlClass(s, status){
  if(!s) return 'dl-ok';
  if(status==='done') return 'dl-done';
  const d = daysLeft(s);
  if(d < 0) return 'dl-over';
  if(d <= 3) return 'dl-soon';
  return 'dl-ok';
}

function dlText(s, status){
  if(!s) return '—';
  if(status==='done') return '✓ Xong';
  const d = daysLeft(s);
  if(d < 0) return `Trễ ${Math.abs(d)} ngày`;
  if(d === 0) return 'Hôm nay!';
  if(d <= 3) return `Còn ${d} ngày`;
  return s;
}

function badge(status){
  const labels = {done:'✓ Xong',active:'▸ Đang làm',review:'◈ Chờ duyệt',pending:'○ Chuẩn bị',blocked:'✕ Bị chặn',todo:'· Chờ',needs_edit:'↩ Cần sửa'};
  return `<span class="badge b-${status}">${labels[status]||status}</span>`;
}

function calcPct(proj){
  const t = db.tasks.filter(x=>x.proj===proj.id);
  if(!t.length) return proj.currentPhase * 20;
  return Math.round(t.filter(x=>x.status==='done').length / t.length * 100);
}

function genId(){ return 'T' + Date.now().toString().slice(-6); }

function deleteProject(projId){
  const proj = db.projects.find(p=>p.id===projId);
  if(!proj) return;
  const taskCount = db.tasks.filter(t=>t.proj===projId).length;
  const msg = taskCount > 0
    ? `Xóa dự án "${proj.name}" sẽ xóa luôn ${taskCount} task liên quan. Xác nhận?`
    : `Xóa dự án "${proj.name}"? Không thể hoàn tác.`;
  if(!confirm(msg)) return;
  db.projects = db.projects.filter(p=>p.id!==projId);
  db.tasks    = db.tasks.filter(t=>t.proj!==projId);
  save(db); renderPage(); toast('Đã xóa dự án');
}

function toast(msg, type='ok'){
  const el = document.createElement('div');
  el.className = 'toast';
  const icon = type==='ok' ? '✓' : type==='warn' ? '⚠' : '✕';
  el.innerHTML = `<span style="color:${type==='ok'?'var(--done-c)':type==='warn'?'var(--pending-c)':'var(--blocked-c)'}">${icon}</span> ${msg}`;
  document.getElementById('toasts').prepend(el);
  setTimeout(()=>el.remove(), 3000);
}

function renderTimeline(){
  if(!db.projects.length) return `<div class="empty-state"><div class="empty-icon">◫</div>Chưa có dự án</div>`;

  const proj = db.projects[0];
  const start = new Date(proj.startDate).getTime();
  const end = new Date(proj.deadlines[4] || '2026-12-31').getTime();
  const total = end - start;
  const todayPct = Math.min(100, Math.max(0, (TODAY.getTime()-start)/total*100));

  const colors = ['#378ADD','#1D9E75','#BA7517','#993556','#534AB7'];
  let phStart = start;

  let h = `<div class="sec-header"><div class="sec-title">◫ Gantt — ${proj.name}</div></div>
  <div class="gantt-wrap"><div class="gantt">
    <div class="gantt-header">
      <div class="gantt-label-col">Giai đoạn</div>
      <div class="gantt-bar-col" style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3)">
        <span>${proj.startDate}</span><span>Hôm nay</span><span>${proj.deadlines[4]||''}</span>
      </div>
      <div style="width:90px;text-align:right">Deadline</div>
    </div>`;

  proj.deadlines.forEach((dl, i) => {
    const phEnd = new Date(dl).getTime();
    const left = (phStart - start)/total*100;
    const width = (phEnd - phStart)/total*100;
    const isDone = i < proj.currentPhase;
    const isActive = i === proj.currentPhase;
    const tasks_ph = db.tasks.filter(t=>t.proj===proj.id&&t.phase===i);
    const done_ph = tasks_ph.filter(t=>t.status==='done').length;
    const label = tasks_ph.length ? `${done_ph}/${tasks_ph.length} tasks` : phaseShort[i];

    h += `<div class="gantt-row">
      <div class="gantt-row-label">
        <span style="color:${isActive?'var(--gold2)':isDone?'var(--done-c)':'var(--text3)'};font-weight:${isActive||isDone?'600':'400'}">${isActive?'▸ ':''}${phaseShort[i]} ${phaseNames[i]}</span>
      </div>
      <div class="gantt-row-track" style="position:relative">
        <div class="gantt-bg"></div>
        <div class="gantt-fill" style="left:${left.toFixed(1)}%;width:${Math.max(2,width).toFixed(1)}%;background:${colors[i]};opacity:${isDone?1:isActive?0.85:0.35}">${label}</div>
        <div class="gantt-today" style="left:${todayPct.toFixed(1)}%;position:absolute;top:0;width:1.5px;height:100%;background:#f87171;z-index:5"></div>
      </div>
      <div class="gantt-deadline">${dl}</div>
    </div>`;
    phStart = phEnd;
  });

  h += `</div></div>`;
  h += `<div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:14px">
    ${colors.map((c,i)=>`<div style="display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)"><div style="width:10px;height:10px;border-radius:2px;background:${c}"></div>${phaseShort[i]} ${phaseNames[i]}</div>`).join('')}
    <div style="display:flex;align-items:center;gap:6px;font-size:11px;color:#f87171"><div style="width:2px;height:12px;background:#f87171"></div>Hôm nay</div>
  </div>`;
  return h;
}

function renderKPI(){
  const tasks = db.tasks;
  const total = tasks.length;
  const done = tasks.filter(t=>t.status==='done').length;
  const onTimeDone = tasks.filter(t=>t.status==='done'&&t.deadline&&daysLeft(t.deadline)>=0).length;
  const overdue = tasks.filter(t=>t.status!=='done'&&t.deadline&&daysLeft(t.deadline)<0).length;
  const pctOnTime = total ? Math.round(onTimeDone/total*100) : 0;

  const byAssignee = ['TN','WH02','AI'].map(a=>({
    a, total: tasks.filter(t=>t.assignee===a).length,
    done: tasks.filter(t=>t.assignee===a&&t.status==='done').length
  }));

  const byPhase = [0,1,2,3,4].map(p=>({
    p, total: tasks.filter(t=>t.phase===p).length,
    done: tasks.filter(t=>t.phase===p&&t.status==='done').length
  })).filter(x=>x.total>0);

  let h = `<div class="kpi-grid">
  <div class="kpi-card">
    <div class="kpi-card-title">◈ KPI vận hành</div>
    <div class="kpi-row">
      <span>Task Brief đúng hạn</span>
      <span class="kpi-target">≥ 80%</span>
      <span class="kpi-result ${pctOnTime>=80?'kpi-ok':pctOnTime>=60?'kpi-warn':'kpi-bad'}">${pctOnTime}%</span>
    </div>
    <div class="kpi-row">
      <span>Trễ deadline không báo trước</span>
      <span class="kpi-target">0 lần</span>
      <span class="kpi-result ${overdue===0?'kpi-ok':'kpi-bad'}">${overdue} tasks</span>
    </div>
    <div class="kpi-row">
      <span>Tỷ lệ hoàn thành tổng</span>
      <span class="kpi-target">—</span>
      <span class="kpi-result ${done===total&&total>0?'kpi-ok':done/total>=.5?'kpi-warn':'kpi-bad'}">${total?Math.round(done/total*100):0}%</span>
    </div>
  </div>

  <div class="kpi-card">
    <div class="kpi-card-title">◻ Phân bổ trạng thái</div>
    ${Object.keys(statusMap).map(s=>{
      const cnt = tasks.filter(t=>t.status===s).length;
      const pct = total ? Math.round(cnt/total*100) : 0;
      return `<div class="kpi-row">
        <span>${badge(s)}</span>
        <span style="font-size:12px">${cnt} tasks</span>
        <div style="flex:1;margin:0 10px;background:var(--navy4);border-radius:99px;height:4px;overflow:hidden">
          <div style="height:100%;border-radius:99px;background:var(--${s==='done'?'done-c':s==='blocked'?'blocked-c':s==='active'?'active-c':'gold'});width:${pct}%;transition:width .4s"></div>
        </div>
        <span class="kpi-target">${pct}%</span>
      </div>`;
    }).join('')}
  </div>

  <div class="kpi-card">
    <div class="kpi-card-title">◎ Phân công thành viên</div>
    ${byAssignee.map(({a,total:t,done:d})=>`
      <div class="kpi-row">
        <span>${av(a)}</span>
        <span style="font-size:12px">${d}/${t}</span>
        <span class="kpi-result ${t>0&&d===t?'kpi-ok':d/t>=.5?'kpi-warn':'kpi-bad'}">${t?Math.round(d/t*100):0}%</span>
      </div>`).join('')}
  </div>

  <div class="kpi-card">
    <div class="kpi-card-title">⬡ Tiến độ theo Phase</div>
    ${byPhase.map(({p,total:t,done:d})=>{
      const pct = t ? Math.round(d/t*100) : 0;
      return `<div class="kpi-row">
        <span style="font-size:11px;font-weight:600;color:var(--gold)">${phaseShort[p]}</span>
        <div style="flex:1;margin:0 10px;background:var(--navy4);border-radius:99px;height:4px;overflow:hidden">
          <div style="height:100%;border-radius:99px;background:var(--gold);width:${pct}%;transition:width .4s"></div>
        </div>
        <span style="font-size:11px;color:var(--text2)">${d}/${t}</span>
        <span class="kpi-result ${pct===100?'kpi-ok':pct>=50?'kpi-warn':'kpi-bad'}">${pct}%</span>
      </div>`;
    }).join('')}
  </div></div>`;
  return h;
}

function switchPage(p){
  const role = window.currentUser?.role || 'member';
  if(role !== 'admin' && (p === 'brief' || p === 'admin' || p === 'review')) return;
  page = p;
  filterPhase = 'all'; filterStatus = 'all'; filterAssignee = 'all';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+p)?.classList.add('active');
  const titles = {overview:'Tổng quan dự án',tasks:'Danh sách Tasks',timeline:'Timeline & Gantt',kpi:'Chỉ số KPI',brief:'Tạo Task Brief',admin:'Quản lý thành viên',review:'Duyệt bài nộp',member_home:'Dashboard của tôi'};
  document.getElementById('page-title').textContent = titles[p]||p;
  renderPage();
}

function renderPage(){
  const role = window.currentUser?.role || 'member';
  const renders = {
    overview:    renderOverview,
    tasks:       renderTasks,
    timeline:    renderTimeline,
    kpi:         renderKPI,
    brief:       renderBrief,
    admin:       ()=>window.renderAdmin?window.renderAdmin():'',
    review:      renderAdminReview,
    member_home: renderMemberDashboard,
  };
  // Member: tổng quan mặc định là member dashboard
  const effectivePage = (role !== 'admin' && page === 'overview') ? 'member_home' : page;
  document.getElementById('content').innerHTML = (renders[effectivePage]||renderOverview)();
  updateBadge();
  if(page==='brief') updateBrief();
}

// Member chỉ thấy task của mình
function getVisibleTasks(){
  const user = window.currentUser;
  if(!user || user.role === 'admin') return db.tasks;
  return db.tasks.filter(t => t.assignee === user.assigneeKey);
}

function updateBadge(){
  const n = getVisibleTasks().filter(t=>t.status!=='done'&&t.deadline&&daysLeft(t.deadline)<=3).length;
  if(window.currentUser?.role==='admin' && window.updateReviewBadge) window.updateReviewBadge();
  const b = document.getElementById('badge-urgent');
  if(b){ b.textContent = n||''; b.className = 'nav-count' + (n?' urgent':''); }
}

// ── MODALS ─────────────────────────────────────────────────
function openModal(id){ document.getElementById(id).classList.add('open'); }
function closeModal(id){ document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.modal-backdrop').forEach(el=>{
  el.addEventListener('click', e=>{ if(e.target===el) closeModal(el.id); });
});

function fillProjSelect(){
  const sel = document.getElementById('f-proj');
  if(!sel) return;
  sel.innerHTML = db.projects.map(p=>`<option value="${p.id}">${p.id}</option>`).join('');
}

function fillAssigneeSelect(currentVal){
  const sel = document.getElementById('f-assignee');
  if(!sel) return;
  // Base options (always present)
  const base = [
    {key:'WH02', label:'WH02 — Nghiên cứu viên'},
    {key:'TN',   label:'TN — Trưởng nhóm'},
    {key:'AI',   label:'Claude AI'},
  ];
  // Merge with dynamic users from Firestore (loaded by loadUsers())
  const dynamic = (window._adminUsers || [])
    .filter(u => u.assigneeKey && !base.find(b => b.key === u.assigneeKey))
    .map(u => ({ key: u.assigneeKey, label: `${u.assigneeKey} — ${u.displayName}` }));
  const all = [...base, ...dynamic];
  sel.innerHTML = all.map(o =>
    `<option value="${o.key}"${o.key === currentVal ? ' selected' : ''}>${o.label}</option>`
  ).join('');
}

function openTaskModal(){
  document.getElementById('modal-task-title').textContent = 'Thêm task mới';
  document.getElementById('edit-task-id').value = '';
  ['f-name','f-output','f-note'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  ['f-phase','f-status','f-review'].forEach(id=>{const el=document.getElementById(id);if(el)el.selectedIndex=0;});
  document.getElementById('f-deadline').value = '';
  fillProjSelect();
  fillAssigneeSelect('WH02');
  openModal('task-modal');
}

function openEditTask(id){
  const t = db.tasks.find(x=>x.id===id); if(!t) return;
  document.getElementById('modal-task-title').textContent = 'Sửa task';
  document.getElementById('edit-task-id').value = id;
  document.getElementById('f-name').value = t.name;
  document.getElementById('f-output').value = t.output||'';
  document.getElementById('f-note').value = t.note||'';
  document.getElementById('f-deadline').value = t.deadline||'';
  document.getElementById('f-phase').value = t.phase;
  fillAssigneeSelect(t.assignee);
  document.getElementById('f-status').value = t.status;
  document.getElementById('f-review').value = t.review||0;
  fillProjSelect();
  document.getElementById('f-proj').value = t.proj;
  openModal('task-modal');
}

function submitTask(){
  const name = document.getElementById('f-name').value.trim();
  if(!name){ toast('Vui lòng nhập tên task','warn'); return; }
  const editId = document.getElementById('edit-task-id').value;
  const task = {
    id: editId || genId(),
    proj: document.getElementById('f-proj').value,
    phase: parseInt(document.getElementById('f-phase').value),
    name,
    assignee: document.getElementById('f-assignee').value,
    deadline: document.getElementById('f-deadline').value,
    status: document.getElementById('f-status').value,
    output: document.getElementById('f-output').value.trim(),
    note: document.getElementById('f-note').value.trim(),
    review: parseInt(document.getElementById('f-review').value),
  };
  if(editId){
    const i = db.tasks.findIndex(t=>t.id===editId);
    if(i>=0) db.tasks[i] = task;
    toast('Đã cập nhật task');
  } else {
    db.tasks.push(task);
    toast('Đã thêm task mới');
  }
  save(db); closeModal('task-modal'); renderPage();
}

function openProjectModal(){
  ['p-id','p-name','p-start'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('p-note').value='';
  openModal('proj-modal');
}

function submitProject(){
  const id = document.getElementById('p-id').value.trim();
  const name = document.getElementById('p-name').value.trim();
  if(!id||!name){ toast('Cần điền mã và tên dự án','warn'); return; }
  db.projects.push({
    id, name,
    note: document.getElementById('p-note').value.trim(),
    startDate: document.getElementById('p-start').value,
    currentPhase: parseInt(document.getElementById('p-phase').value),
    deadlines: ['','','','','']
  });
  save(db); closeModal('proj-modal'); toast('Đã tạo dự án'); renderPage();
}

// ── QUICK ACTIONS ──────────────────────────────────────────
function quickStatus(id, val, sel){
  const t = db.tasks.find(x=>x.id===id);
  if(!t) return;
  // Member chỉ được đổi status task của mình
  const user = window.currentUser;
  if(user && user.role !== 'admin' && t.assignee !== user.assigneeKey){
    toast('Bạn không có quyền thay đổi task này','warn'); return;
  }
  t.status = val;
  sel.className = `status-sel s-${val}`;
  save(db);
  updateBadge();
  // Update stat cards if on overview
  if(page==='overview') renderPage();
  else toast(`${statusDot[val]} ${statusMap[val]}`);
}

function deleteTask(id){
  if(!confirm('Xóa task này?')) return;
  db.tasks = db.tasks.filter(t=>t.id!==id);
  save(db); toast('Đã xóa task'); renderPage();
}


// ── MEMBER DASHBOARD (tổng quan cộng sự) ───────────────────
function renderMemberDashboard(){
  const user = window.currentUser;
  const myTasks = getVisibleTasks();
  const done  = myTasks.filter(t=>t.status==='done').length;
  const pct   = myTasks.length ? Math.round(done/myTasks.length*100) : 0;
  const r = 28, circ = 2*Math.PI*r;
  const offset = circ - (pct/100)*circ;
  const needsEdit = myTasks.filter(t=>t.status==='needs_edit');
  const inReview  = myTasks.filter(t=>t.status==='review' && t.submission);
  const myProjects = db.projects.filter(p=>
    (p.members||[]).includes(user?.assigneeKey) ||
    myTasks.some(t=>t.proj===p.id)
  );

  let h = `<div class="member-dash-header">
    <div class="member-progress-ring">
      <svg width="64" height="64" viewBox="0 0 64 64">
        <circle class="ring-bg" cx="32" cy="32" r="${r}"/>
        <circle class="ring-fill" cx="32" cy="32" r="${r}"
          stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
      </svg>
      <div class="ring-text">${pct}%</div>
    </div>
    <div>
      <div style="font-size:16px;font-weight:600;color:var(--text)">Xin chào, ${user?.displayName||'Cộng sự'}!</div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px">${done}/${myTasks.length} task hoàn thành · ${myProjects.length} dự án tham gia</div>
      ${needsEdit.length ? `<div style="margin-top:6px"><span class="badge b-blocked">↩ ${needsEdit.length} task cần chỉnh sửa</span></div>` : ''}
      ${inReview.length  ? `<div style="margin-top:4px"><span class="badge b-review">◈ ${inReview.length} bài đang chờ duyệt</span></div>`  : ''}
    </div>
  </div>`;

  // Tasks cần sửa (ưu tiên hiện lên đầu)
  if(needsEdit.length){
    h += `<div class="sec-header"><div class="sec-title">↩ Cần chỉnh sửa</div></div>
    <div class="task-table-wrap"><table class="task-table"><thead><tr>
      <th>Task</th><th>Dự án</th><th>Deadline</th><th>Ghi chú admin</th><th></th>
    </tr></thead><tbody>`;
    needsEdit.forEach(t=>{
      const proj = db.projects.find(p=>p.id===t.proj);
      h += `<tr style="background:rgba(239,68,68,.04)">
        <td><div class="task-name-main">${t.name}</div><div class="task-name-sub">${t.id}</div></td>
        <td style="font-size:12px;color:var(--text2)">${proj?.name||t.proj}</td>
        <td><span class="${dlClass(t.deadline,t.status)}">${dlText(t.deadline,t.status)}</span></td>
        <td><div class="review-note reject" style="margin:0">${t.reviewNote||'—'}</div></td>
        <td><button class="btn btn-gold" style="font-size:11px;padding:4px 10px" onclick="openSubmitModal('${t.id}')">📤 Nộp lại</button></td>
      </tr>`;
    });
    h += '</tbody></table></div>';
  }

  // Tasks đang chờ duyệt
  if(inReview.length){
    h += `<div class="sec-header" style="margin-top:20px"><div class="sec-title">◈ Đang chờ admin duyệt</div></div>
    <div class="task-table-wrap"><table class="task-table"><thead><tr>
      <th>Task</th><th>Dự án</th><th>Nộp lúc</th><th>Trạng thái</th>
    </tr></thead><tbody>`;
    inReview.forEach(t=>{
      const proj = db.projects.find(p=>p.id===t.proj);
      h += `<tr>
        <td><div class="task-name-main">${t.name}</div><div class="task-name-sub">${t.id}</div></td>
        <td style="font-size:12px;color:var(--text2)">${proj?.name||t.proj}</td>
        <td style="font-size:11px;color:var(--text3)">${t.submission?.submittedAt?.slice(0,16).replace('T',' ')||'—'}</td>
        <td><span class="badge b-review">◈ Chờ duyệt</span></td>
      </tr>`;
    });
    h += '</tbody></table></div>';
  }

  // Tất cả tasks của tôi
  h += `<div class="sec-header" style="margin-top:20px"><div class="sec-title">☰ Tasks của tôi</div></div>
  <div class="task-table-wrap"><table class="task-table"><thead><tr>
    <th>Task</th><th>Dự án</th><th>Deadline</th><th>Trạng thái</th><th></th>
  </tr></thead><tbody>`;
  const others = myTasks.filter(t=>t.status!=='needs_edit');
  if(!others.length){
    h += `<tr><td colspan="5" style="text-align:center;color:var(--text3);padding:20px">Chưa có task nào</td></tr>`;
  }
  others.forEach(t=>{
    const proj = db.projects.find(p=>p.id===t.proj);
    const canSubmit = t.status === 'active' || t.status === 'needs_edit';
    h += `<tr>
      <td><div class="task-name-main">${t.name}</div><div class="task-name-sub">${t.id} · ${phaseFull[t.phase]}</div></td>
      <td style="font-size:12px;color:var(--text2)">${proj?.name||t.proj}</td>
      <td><span class="${dlClass(t.deadline,t.status)}">${dlText(t.deadline,t.status)}</span></td>
      <td>${badge(t.status)}</td>
      <td>${t.status==='active' ? `<button class="btn btn-gold" style="font-size:11px;padding:4px 10px" onclick="openSubmitModal('${t.id}')">📤 Nộp bài</button>` : ''}</td>
    </tr>`;
  });
  h += '</tbody></table></div>';
  return h;
}

// ── ADMIN REVIEW PAGE ───────────────────────────────────────
function renderAdminReview(){
  const pending = db.tasks.filter(t=>t.status==='review' && t.submission);
  let h = `<div class="sec-header"><div class="sec-title">🔍 Bài nộp chờ duyệt (${pending.length})</div></div>`;
  if(!pending.length){
    h += `<div class="empty-state"><div class="empty-icon">✓</div>Không có bài nào chờ duyệt</div>`;
    return h;
  }
  pending.forEach(t=>{
    const proj = db.projects.find(p=>p.id===t.proj);
    const sub  = t.submission;
    h += `<div class="admin-section" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <div style="font-weight:600;color:var(--text)">${t.name}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">${t.id} · ${proj?.name||t.proj} · ${t.assignee}</div>
        </div>
        <span class="badge b-review">Chờ duyệt</span>
      </div>
      <div class="submission-box" style="margin-top:10px">
        <div class="submission-file">📄 ${sub.fileName||'file.docx'}</div>
        <div style="font-size:12px;color:var(--text2)">${sub.note||'Không có ghi chú'}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:4px">Nộp: ${sub.submittedAt?.slice(0,16).replace('T',' ')||'—'} · ${sub.submitterName||t.assignee}</div>
      </div>
      <div class="review-actions">
        <button class="btn-approve" onclick="openReviewModal('${t.id}','approve')">✅ Duyệt</button>
        <button class="btn-reject"  onclick="openReviewModal('${t.id}','reject')">↩ Trả lại</button>
      </div>
    </div>`;
  });
  return h;
}

// ── SUBMISSION FUNCTIONS ────────────────────────────────────
let _pendingFileData = null;

function openSubmitModal(taskId){
  const t = db.tasks.find(x=>x.id===taskId);
  if(!t) return;
  document.getElementById('submit-task-id').value  = taskId;
  document.getElementById('submit-task-name').textContent = t.name;
  document.getElementById('submit-note').value     = '';
  document.getElementById('submit-file-preview').style.display = 'none';
  document.getElementById('submit-file-input').value = '';
  _pendingFileData = null;
  document.getElementById('submit-modal').classList.add('open');
}

function onFileSelect(input){
  const file = input.files[0];
  if(!file) return;
  _pendingFileData = { name: file.name, size: file.size };
  document.getElementById('submit-file-name').textContent = file.name;
  document.getElementById('submit-file-preview').style.display = 'flex';
}

function clearFile(){
  _pendingFileData = null;
  document.getElementById('submit-file-input').value = '';
  document.getElementById('submit-file-preview').style.display = 'none';
}

function submitTask(){
  const taskId = document.getElementById('submit-task-id').value;
  const note   = document.getElementById('submit-note').value.trim();
  const t = db.tasks.find(x=>x.id===taskId);
  if(!t) return;
  if(!_pendingFileData){ toast('Vui lòng chọn file Word để nộp','warn'); return; }
  t.submission = {
    fileName:      _pendingFileData.name,
    note:          note,
    submittedAt:   new Date().toISOString(),
    submitterName: window.currentUser?.displayName || t.assignee,
  };
  t.status    = 'review';
  t.reviewNote = '';
  save(db);
  closeModal('submit-modal');
  renderPage();
  toast('Đã nộp bài — chờ admin duyệt');
}

function openReviewModal(taskId){
  const t = db.tasks.find(x=>x.id===taskId);
  if(!t || !t.submission) return;
  document.getElementById('review-task-id').value = taskId;
  document.getElementById('review-task-name').textContent = t.name;
  document.getElementById('review-note').value = '';
  const sub = t.submission;
  document.getElementById('review-submission-info').innerHTML = `
    <div class="submission-file">📄 ${sub.fileName||'file.docx'}</div>
    <div style="font-size:12px;color:var(--text2);margin-top:4px">${sub.note||'Không có ghi chú'}</div>
    <div style="font-size:11px;color:var(--text3);margin-top:4px">Nộp: ${sub.submittedAt?.slice(0,16).replace('T',' ')||'—'} bởi ${sub.submitterName||''}</div>`;
  document.getElementById('review-modal').classList.add('open');
}

function approveTask(){
  const taskId = document.getElementById('review-task-id').value;
  const note   = document.getElementById('review-note').value.trim();
  const t = db.tasks.find(x=>x.id===taskId);
  if(!t) return;
  t.status     = 'done';
  t.reviewNote = note || 'Admin đã duyệt ✅';
  save(db);
  closeModal('review-modal');
  renderPage();
  toast('Đã duyệt — task hoàn thành!');
}

function rejectTask(){
  const taskId = document.getElementById('review-task-id').value;
  const note   = document.getElementById('review-note').value.trim();
  if(!note){ toast('Vui lòng nhập ghi chú lý do trả lại','warn'); return; }
  const t = db.tasks.find(x=>x.id===taskId);
  if(!t) return;
  t.status     = 'needs_edit';
  t.reviewNote = note;
  save(db);
  closeModal('review-modal');
  renderPage();
  toast('Đã trả lại — cộng sự sẽ nhận thông báo');
}

window.createMember = async function(){
  const email = document.getElementById('new-user-email').value.trim();
  const pass  = document.getElementById('new-user-pass').value;
  const name  = document.getElementById('new-user-name').value.trim();
  const key   = document.getElementById('new-user-key').value.trim().toUpperCase();
  if(!email||!pass||!name||!key){ window.toast('Điền đủ thông tin','warn'); return; }
  if(pass.length < 6){ window.toast('Mật khẩu tối thiểu 6 ký tự','warn'); return; }
  try {
    // Tạo tài khoản phụ (dùng secondary app để không logout admin)
    const secondaryApp  = initializeApp(firebaseConfig, 'secondary-'+Date.now());
    const secondaryAuth = getAuth(secondaryApp);
    const cred = await createUserWithEmailAndPassword(secondaryAuth, email, pass);
    await updateProfile(cred.user, { displayName: name });
    // Lưu profile vào Firestore
    // Lấy danh sách dự án được assign
    const projSel = document.getElementById('new-user-proj');
    const assignedProjects = projSel ? Array.from(projSel.selectedOptions).map(o=>o.value) : [];
    await setDoc(doc(db_fs, 'users', cred.user.uid), {
      uid: cred.user.uid, email, displayName: name,
      assigneeKey: key, role: 'member',
      assignedProjects,
      createdAt: new Date().toISOString()
    });
    // Cập nhật members field trong từng project
    const currentDb = window._getDb();
    assignedProjects.forEach(pid => {
      const proj = currentDb.projects.find(p=>p.id===pid);
      if(proj){ if(!proj.members) proj.members=[]; if(!proj.members.includes(key)) proj.members.push(key); }
    });
    window._setDb(currentDb);
    await window.save(currentDb);
    await signOut(secondaryAuth);
    window.toast('Đã tạo tài khoản: ' + email);
    await loadUsers(); // reload _adminUsers so getMemberMap() picks up the new member
    window._renderPage();
  } catch(e){
    window.toast('Lỗi: ' + friendlyErr(e.code), 'warn');
  }
};

// ── Auth state handler ──────────────────────────────────────
onAuthStateChanged(auth, async (firebaseUser) => {
  if(!firebaseUser){
    // Chưa đăng nhập → hiện overlay
    document.getElementById('auth-overlay').style.display = 'flex';
    document.getElementById('app-shell').style.display    = 'none';
    return;
  }

  // Đã đăng nhập → lấy profile từ Firestore
  let role = 'member';
  let assigneeKey = 'WH02';
  let displayName = firebaseUser.displayName || firebaseUser.email;

  try {
    const uSnap = await getDoc(doc(db_fs, 'users', firebaseUser.uid));
    if(uSnap.exists()){
      const uData = uSnap.data();
      role        = uData.role || 'member';
      assigneeKey = uData.assigneeKey || 'WH02';
      displayName = uData.displayName || displayName;
    } else {
      // User chưa có profile (ví dụ: Google login lần đầu)
      // Kiểm tra nếu là email admin đầu tiên → tạo admin
      const usersSnap = await getDocs(collection(db_fs, 'users'));
      if(usersSnap.empty){
        role = 'admin'; assigneeKey = 'TN';
        await setDoc(doc(db_fs, 'users', firebaseUser.uid), {
          uid: firebaseUser.uid, email: firebaseUser.email,
          displayName, assigneeKey, role,
          createdAt: new Date().toISOString()
        });
      }
    }
  } catch(e){ console.error('Profile load error:', e); }

  // Set global user
  window.currentUser = { uid: firebaseUser.uid, email: firebaseUser.email, displayName, role, assigneeKey };

  // Cập nhật sidebar user chip
  const initials = displayName.slice(0,2).toUpperCase();
  document.getElementById('current-user-av').textContent    = initials;
  document.getElementById('current-user-name').textContent  = displayName;
  document.getElementById('current-user-role').textContent  = role === 'admin' ? '👑 Admin' : '👤 Cộng sự';

  // Áp dụng UI theo role
  window.applyRoleUI(role);

  // Load users list nếu là admin
  if(role === 'admin') await loadUsers();

  // Hiện app
  document.getElementById('auth-overlay').style.display = 'none';
  document.getElementById('app-shell').style.display    = 'flex';

  // Khởi động Firestore sync
  await initFirestore();
});

// ── Firestore sync ──────────────────────────────────────────
let _ignoreNext = false;

async function initFirestore(){
  setStatus('connecting');
  try {
    const snap = await getDoc(DATA_DOC);
    if(!snap.exists()){
      const localData = window._getDb();
      if(localData && typeof localData === 'object'){
        await setDoc(DATA_DOC, localData);
      }
    } else {
      window._setDb(snap.data());
      window._renderPage();
    }
    setStatus('synced');
  } catch(e){ setStatus('error'); console.error('Firestore init error:', e); }

  onSnapshot(DATA_DOC, snap => {
    if(!snap.exists()||_ignoreNext){ _ignoreNext=false; return; }
    const remote = snap.data();
    if(JSON.stringify(remote) !== JSON.stringify(window._getDb())){
      window._setDb(remote);
      window._renderPage();
      setStatus('synced');
    }
  }, err => { setStatus('error'); });

  window.save = async function(d){
    try { localStorage.setItem(window._DB_KEY, JSON.stringify(d)); } catch(e){}
    setStatus('saving');
    try {
      _ignoreNext = true;
      await setDoc(DATA_DOC, d);
      setStatus('synced');
    } catch(e){
      _ignoreNext = false; setStatus('error');
      window.toast('Lỗi lưu cloud','warn');
    }
  };
}

function showErr(msg){

function friendlyErr(code){
  const m = {
    'auth/invalid-email':        'Email không hợp lệ',
    'auth/user-not-found':       'Không tìm thấy tài khoản',
    'auth/wrong-password':       'Sai mật khẩu',
    'auth/invalid-credential':   'Email hoặc mật khẩu không đúng',
    'auth/email-already-in-use': 'Email đã được sử dụng',
    'auth/weak-password':        'Mật khẩu quá yếu (tối thiểu 6 ký tự)',
    'auth/popup-closed-by-user': 'Đã đóng cửa sổ đăng nhập',
    'auth/network-request-failed':'Lỗi mạng, thử lại sau',
  };
  return m[code] || ('Lỗi: ' + code);
}
